name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      ingestion-service: ${{ steps.filter.outputs.ingestion-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            ingestion-service:
              - 'services/ingestion-service/**'

  api-gateway:
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests

  ingestion-service:
    needs: changes
    if: needs.changes.outputs.ingestion-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rabbitmq:
        image: rabbitmq:4-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
    defaults:
      run:
        working-directory: services/ingestion-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/ingestion-service/go.mod
          cache-dependency-path: services/ingestion-service/go.sum
      - run: go vet ./...
      - run: go test ./... -v -count=1
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/invoice_test?sslmode=disable
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
