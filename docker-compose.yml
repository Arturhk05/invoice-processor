services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invoice_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U invoice_user -d invoice_db']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    build:
      context: ./services/ingestion-service
      target: production
    ports:
      - '8080:8080'
    env_file:
      - ./services/ingestion-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  api-gateway:
    build:
      context: ./services/api-gateway
      target: development
    ports:
      - '3000:3000'
    env_file:
      - ./services/api-gateway/.env
    volumes:
      - ./services/api-gateway/src:/app/src
    depends_on:
      ingestion-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
